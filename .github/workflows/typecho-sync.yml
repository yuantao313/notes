name: Typecho Article Sync

on:
  schedule:
    - cron: '*/30 * * * *'   # 每 30 分钟
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install html2text boto3

      - name: Sync to R2
        env:
          TYPECHO_URL: ${{ secrets.TYPECHO_URL }}
          TYPECHO_USERNAME: ${{ secrets.TYPECHO_USERNAME }}
          TYPECHO_PASSWORD: ${{ secrets.TYPECHO_PASSWORD }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PREFIX: posts/
        run: python typecho_export.py

      - name: Keep alive
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin alive 2>/dev/null || true
          git checkout alive 2>/dev/null || git checkout --orphan alive
          git reset --hard
          echo "$(date -u '+%Y-%m-%d %H:%M:%S UTC')" > .alive
          git add .alive
          git commit -m "keep alive $(date -u '+%Y-%m-%d %H:%M UTC')" --allow-empty
          git push origin alive
